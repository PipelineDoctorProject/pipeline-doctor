services:
  migrate:
    image: ${OPSSIGHT_BACKEND_IMAGE:?Set OPSSIGHT_BACKEND_IMAGE to your pushed backend image}
    env_file:
      - ${OPSSIGHT_BACKEND_ENV_FILE:-./backend/fastapi/.env.example}
    command: sh -c "alembic upgrade head && python scripts/repair_tenant_schemas.py"
    restart: "no"

  api:
    image: ${OPSSIGHT_BACKEND_IMAGE:?Set OPSSIGHT_BACKEND_IMAGE to your pushed backend image}
    env_file:
      - ${OPSSIGHT_BACKEND_ENV_FILE:-./backend/fastapi/.env.example}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ${OPSSIGHT_BACKEND_IMAGE:?Set OPSSIGHT_BACKEND_IMAGE to your pushed backend image}
    env_file:
      - ${OPSSIGHT_BACKEND_ENV_FILE:-./backend/fastapi/.env.example}
    command: celery -A app.core.celery_app:celery worker --loglevel=info --queues=ai,scheduler,emails,remediation --concurrency=${CELERY_CONCURRENCY:-2}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  beat:
    image: ${OPSSIGHT_BACKEND_IMAGE:?Set OPSSIGHT_BACKEND_IMAGE to your pushed backend image}
    env_file:
      - ${OPSSIGHT_BACKEND_ENV_FILE:-./backend/fastapi/.env.example}
    command: celery -A app.core.celery_app:celery beat --loglevel=info
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: ${OPSSIGHT_FRONTEND_IMAGE:?Set OPSSIGHT_FRONTEND_IMAGE to your pushed frontend image}
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
