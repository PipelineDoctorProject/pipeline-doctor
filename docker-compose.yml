services:
  api:
    build:
      context: ./backend/fastapi
    image: pipeline-doctor-backend:local
    container_name: pipeline-doctor-api
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/fastapi/.env
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI: ${REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS: ${REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS:-model,candidate_model}
      DB_POOL_SIZE: ${API_DB_POOL_SIZE:-4}
      DB_MAX_OVERFLOW: ${API_DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT: ${API_DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-300}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
      - backend_cleaned:/app/cleaned
      - backend_mlartifacts:/app/mlartifacts
    restart: unless-stopped

  celery-worker:
    image: pipeline-doctor-backend:local
    container_name: pipeline-doctor-celery-worker
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/fastapi/.env
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI: ${REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS: ${REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS:-model,candidate_model}
      DB_POOL_SIZE: ${WORKER_DB_POOL_SIZE:-1}
      DB_MAX_OVERFLOW: ${WORKER_DB_MAX_OVERFLOW:-0}
      DB_POOL_TIMEOUT: ${WORKER_DB_POOL_TIMEOUT:-15}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-300}
    command: celery -A app.core.celery_app:celery worker -Q ai,scheduler,emails,remediation -l info --concurrency=${WORKER_CONCURRENCY:-1} --max-tasks-per-child=20
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
      - backend_cleaned:/app/cleaned
      - backend_mlartifacts:/app/mlartifacts
    restart: unless-stopped

  celery-beat:
    image: pipeline-doctor-backend:local
    container_name: pipeline-doctor-celery-beat
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - ./backend/fastapi/.env
    environment:
      APP_ENV: development
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI: ${REMEDIATION_CANDIDATE_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS: ${REMEDIATION_MLFLOW_RUN_ARTIFACT_PATHS:-model,candidate_model}
      DB_POOL_SIZE: ${BEAT_DB_POOL_SIZE:-1}
      DB_MAX_OVERFLOW: ${BEAT_DB_MAX_OVERFLOW:-0}
      DB_POOL_TIMEOUT: ${BEAT_DB_POOL_TIMEOUT:-15}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-300}
    command: celery -A app.core.celery_app:celery beat -l info --schedule /app/celerybeat/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celerybeat_state:/app/celerybeat
    restart: unless-stopped

  mlflow:
    image: pipeline-doctor-backend:local
    container_name: pipeline-doctor-mlflow
    env_file:
      - ./backend/fastapi/.env
    command: >
      sh -c "mkdir -p ${MLFLOW_ARTIFACT_ROOT:-/app/mlartifacts} &&
             mlflow server --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg2://mlflow:mlflow@mlflow-db/mlflow} --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/app/mlartifacts} --workers 1 --host 0.0.0.0 --port 5000 --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
    ports:
      - "5000:5000"
    volumes:
      - backend_mlartifacts:/app/mlartifacts
    depends_on:
      mlflow-db:
        condition: service_healthy
    restart: unless-stopped

  mlflow-db:
    image: postgres:15
    container_name: pipeline-doctor-mlflow-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD:-mlflow}
      POSTGRES_DB: mlflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pipeline-doctor-redis
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - backend_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-db:
    image: postgres:15
    container_name: pipeline-doctor-airflow-db
    hostname: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.8.0
    container_name: pipeline-doctor-airflow-init
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@airflow-db/airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-opssight_secret_key}
      OPSSIGHT_CONN_ID: ${OPSSIGHT_CONN_ID:-opssight_api}
      AIRFLOW_CONN_OPSSIGHT_API: ${AIRFLOW_CONN_OPSSIGHT_API:-}
      AIRFLOW_VAR_OPSSIGHT_API_URL: ${AIRFLOW_VAR_OPSSIGHT_API_URL:-http://api:8000}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-change-me}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    command: >
      bash -c "until getent hosts airflow-db >/dev/null 2>&1; do echo 'Waiting for airflow-db DNS...'; sleep 2; done &&
               until pg_isready -h airflow-db -U airflow >/dev/null 2>&1; do echo 'Waiting for airflow-db readiness...'; sleep 2; done &&
               airflow db migrate &&
               airflow users create --username $$AIRFLOW_ADMIN_USERNAME --password $$AIRFLOW_ADMIN_PASSWORD --firstname $$AIRFLOW_ADMIN_FIRSTNAME --lastname $$AIRFLOW_ADMIN_LASTNAME --role Admin --email $$AIRFLOW_ADMIN_EMAIL ||
               echo Airflow admin user already exists"
    volumes:
      - ./airflow-setup/dags:/opt/airflow/dags
      - ./airflow-setup/data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    depends_on:
      airflow-db:
        condition: service_healthy
      api:
        condition: service_started
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: pipeline-doctor-airflow-webserver
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@airflow-db/airflow}
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-opssight_secret_key}
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__SHOW_TRIGGER_FORM_IF_NO_PARAMS: "true"
      OPSSIGHT_CONN_ID: ${OPSSIGHT_CONN_ID:-opssight_api}
      AIRFLOW_CONN_OPSSIGHT_API: ${AIRFLOW_CONN_OPSSIGHT_API:-}
      AIRFLOW_VAR_OPSSIGHT_API_URL: ${AIRFLOW_VAR_OPSSIGHT_API_URL:-http://api:8000}
    command: >
      bash -c "until getent hosts airflow-db >/dev/null 2>&1; do echo 'Waiting for airflow-db DNS...'; sleep 2; done &&
               until pg_isready -h airflow-db -U airflow >/dev/null 2>&1; do echo 'Waiting for airflow-db readiness...'; sleep 2; done &&
               rm -f /opt/airflow/airflow-webserver.pid &&
               exec airflow webserver"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow-setup/dags:/opt/airflow/dags
      - ./airflow-setup/data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: pipeline-doctor-airflow-scheduler
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DATABASE_SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@airflow-db/airflow}
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-opssight_secret_key}
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW__SCHEDULER__STANDALONE_DAG_PROCESSOR: "false"
      OPSSIGHT_CONN_ID: ${OPSSIGHT_CONN_ID:-opssight_api}
      AIRFLOW_CONN_OPSSIGHT_API: ${AIRFLOW_CONN_OPSSIGHT_API:-}
      AIRFLOW_VAR_OPSSIGHT_API_URL: ${AIRFLOW_VAR_OPSSIGHT_API_URL:-http://api:8000}
    command: >
      bash -c "until getent hosts airflow-db >/dev/null 2>&1; do echo 'Waiting for airflow-db DNS...'; sleep 2; done &&
               until pg_isready -h airflow-db -U airflow >/dev/null 2>&1; do echo 'Waiting for airflow-db readiness...'; sleep 2; done &&
               exec airflow scheduler"
    volumes:
      - ./airflow-setup/dags:/opt/airflow/dags
      - ./airflow-setup/data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pipeline-doctor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: pipeline-doctor-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/opssight.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: pipeline-doctor-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: pipeline-doctor-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_cleaned:
  backend_mlartifacts:
  backend_redis_data:
  celerybeat_state:
  airflow_db_data:
  mlflow_db_data:
  airflow_logs:
  airflow_plugins:
  grafana_data:
