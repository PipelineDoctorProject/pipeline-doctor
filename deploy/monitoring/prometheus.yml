global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI application metrics via prometheus-fastapi-instrumentator
  - job_name: opssight_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  # Redis metrics via redis_exporter sidecar
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Celery task queue metrics via celery-exporter sidecar
  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]

  # Host system metrics (CPU, memory, disk) via node_exporter
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
