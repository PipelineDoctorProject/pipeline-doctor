name: Container Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub/Azure environment to use.
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: staging
      image_tag:
        description: Image tag to push to Azure Container Registry.
        required: true
        default: latest
      push_images:
        description: Push images to ACR after building.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  API_IMAGE: opssight-api
  FRONTEND_IMAGE: opssight-frontend
  AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME || secrets.AZURE_CONTAINER_REGISTRY_NAME }}
  AZURE_CONTAINER_REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER || secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}

jobs:
  build:
    name: Build And Optionally Push Images
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        if: inputs.push_images
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR settings
        if: inputs.push_images
        run: |
          tfvars_file="deploy/terraform/environments/${{ inputs.environment }}/terraform.tfvars.example"

          if [ -n "${AZURE_CONTAINER_REGISTRY_NAME}" ]; then
            acr_name="${AZURE_CONTAINER_REGISTRY_NAME#https://}"
            acr_name="${acr_name#http://}"
            acr_name="${acr_name%%/*}"
            acr_name="${acr_name%%.azurecr.io}"
            echo "AZURE_CONTAINER_REGISTRY_NAME=${acr_name}" >> "$GITHUB_ENV"
            AZURE_CONTAINER_REGISTRY_NAME="${acr_name}"
          fi

          if [ -z "${AZURE_CONTAINER_REGISTRY_NAME}" ] && [ -n "${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}" ]; then
            echo "AZURE_CONTAINER_REGISTRY_NAME=${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER%%.azurecr.io}" >> "$GITHUB_ENV"
            AZURE_CONTAINER_REGISTRY_NAME="${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER%%.azurecr.io}"
          fi

          if [ -z "${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}" ] && [ -n "${AZURE_CONTAINER_REGISTRY_NAME}" ]; then
            echo "AZURE_CONTAINER_REGISTRY_LOGIN_SERVER=${AZURE_CONTAINER_REGISTRY_NAME}.azurecr.io" >> "$GITHUB_ENV"
            AZURE_CONTAINER_REGISTRY_LOGIN_SERVER="${AZURE_CONTAINER_REGISTRY_NAME}.azurecr.io"
          fi

          if [ -f "${tfvars_file}" ]; then
            tfvars_acr_name="$(sed -n 's/^container_registry_name[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' "${tfvars_file}")"

            if [ -n "${tfvars_acr_name}" ]; then
              if ! az acr show --name "${AZURE_CONTAINER_REGISTRY_NAME}" > /dev/null 2>&1; then
                echo "Using ACR name from ${tfvars_file}."
                echo "AZURE_CONTAINER_REGISTRY_NAME=${tfvars_acr_name}" >> "$GITHUB_ENV"
                echo "AZURE_CONTAINER_REGISTRY_LOGIN_SERVER=${tfvars_acr_name}.azurecr.io" >> "$GITHUB_ENV"
                AZURE_CONTAINER_REGISTRY_NAME="${tfvars_acr_name}"
                AZURE_CONTAINER_REGISTRY_LOGIN_SERVER="${tfvars_acr_name}.azurecr.io"
              fi
            fi
          fi

          if [ -z "${AZURE_CONTAINER_REGISTRY_NAME}" ] && [ -z "${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}" ]; then
            echo "Missing dev environment variables: AZURE_CONTAINER_REGISTRY_NAME and AZURE_CONTAINER_REGISTRY_LOGIN_SERVER"
            exit 1
          fi

          if ! az acr show --name "${AZURE_CONTAINER_REGISTRY_NAME}" > /dev/null; then
            echo "Azure Container Registry '${AZURE_CONTAINER_REGISTRY_NAME}' was not found in the logged-in subscription."
            echo "Run the IaC workflow with environment='${{ inputs.environment }}' and action='apply', then rerun this workflow."
            exit 1
          fi

      - name: Login to ACR
        if: inputs.push_images
        run: az acr login --name "${AZURE_CONTAINER_REGISTRY_NAME}"

      - name: Build API image
        run: |
          docker build \
            -t ${{ env.API_IMAGE }}:${{ inputs.image_tag }} \
            ./backend/fastapi

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t ${{ env.FRONTEND_IMAGE }}:${{ inputs.image_tag }} \
            .

      - name: Tag images for ACR
        if: inputs.push_images
        run: |
          docker tag \
            ${{ env.API_IMAGE }}:${{ inputs.image_tag }} \
            ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${{ env.API_IMAGE }}:${{ inputs.image_tag }}
          docker tag \
            ${{ env.FRONTEND_IMAGE }}:${{ inputs.image_tag }} \
            ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${{ env.FRONTEND_IMAGE }}:${{ inputs.image_tag }}

      - name: Push API image
        if: inputs.push_images
        run: docker push ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${{ env.API_IMAGE }}:${{ inputs.image_tag }}

      - name: Push frontend image
        if: inputs.push_images
        run: docker push ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/${{ env.FRONTEND_IMAGE }}:${{ inputs.image_tag }}

      - name: Release summary
        run: |
          echo "Built images with tag: ${{ inputs.image_tag }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Push enabled: ${{ inputs.push_images }}"
