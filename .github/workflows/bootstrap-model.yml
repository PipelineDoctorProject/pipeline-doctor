name: Bootstrap Model

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to bootstrap.
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    name: Bootstrap Model (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn mlflow azure-storage-blob

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get MLflow details & run bootstrap
        run: |
          RG_NAME="opssight-${{ inputs.environment }}-rg"
          STORAGE_ACCOUNT="opssight${{ inputs.environment }}mlflow"
          
          echo "Resource Group: $RG_NAME"
          echo "Storage Account: $STORAGE_ACCOUNT"
          
          # Fetch the primary storage connection string using Azure CLI
          echo "Fetching storage connection string..."
          CONN_STR=$(az storage account show-connection-string --name "$STORAGE_ACCOUNT" --resource-group "$RG_NAME" --query connectionString -o tsv)
          
          if [ -z "$CONN_STR" ]; then
            echo "ERROR: Failed to retrieve storage connection string for $STORAGE_ACCOUNT."
            exit 1
          fi
          
          # Resolve MLflow App tracking URL using Azure CLI
          echo "Fetching MLflow Container App URL..."
          MLFLOW_URL=$(az containerapp show --name "opssight-mlflow-${{ inputs.environment }}" --resource-group "$RG_NAME" --query properties.configuration.ingress.fqdn -o tsv)
          
          if [ -z "$MLFLOW_URL" ]; then
            echo "ERROR: Failed to retrieve MLflow URL."
            exit 1
          fi
          
          TRACKING_URI="https://$MLFLOW_URL"
          echo "MLflow Tracking URI: $TRACKING_URI"
          
          # Execute the bootstrap script
          echo "Executing model bootstrap script..."
          export AZURE_STORAGE_CONNECTION_STRING="$CONN_STR"
          python backend/fastapi/app/ml/bootstrap_spotify_kmeans_model.py \
            --data-path "baseline demo/tracks_with_clusters.csv" \
            --tracking-uri "$TRACKING_URI" \
            --experiment-name "OpsSight Cloud Source Models"
