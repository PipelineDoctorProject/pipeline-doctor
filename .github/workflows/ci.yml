name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/fastapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/fastapi/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python sources
        run: python -m compileall app scripts tests

      - name: Run backend tests
        run: python -m pytest tests

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    name: Docker Build Checks
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.prod.example.yml config --quiet

      - name: Build API image
        run: docker build -t opssight-api:ci ./backend/fastapi

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t opssight-frontend:ci .

  iac:
    name: IaC Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform format
        run: terraform -chdir=deploy/terraform fmt -check -recursive

      - name: Terraform validate dev
        run: |
          terraform -chdir=deploy/terraform/environments/dev init -backend=false
          terraform -chdir=deploy/terraform/environments/dev validate

      - name: Terraform validate prod
        run: |
          terraform -chdir=deploy/terraform/environments/prod init -backend=false
          terraform -chdir=deploy/terraform/environments/prod validate

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ansible
        run: python -m pip install ansible

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check deploy/ansible/playbooks/site.yml -i deploy/ansible/inventories/dev/hosts.ini
