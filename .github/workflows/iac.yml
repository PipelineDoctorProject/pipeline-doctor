name: IaC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment to run.
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: Run a plan or apply.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      image_tag:
        description: Container image tag to deploy.
        required: true
        default: dev-latest

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_VAR_image_tag: ${{ inputs.image_tag }}
    defaults:
      run:
        working-directory: deploy/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Terraform state
        uses: actions/cache/restore@v4
        with:
          path: |
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate.backup
          key: terraform-state-${{ inputs.environment }}-${{ github.run_id }}
          restore-keys: |
            terraform-state-${{ inputs.environment }}-

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure resource providers
        run: |
          az provider register --namespace Microsoft.App
          az provider register --namespace Microsoft.OperationalInsights
          az provider register --namespace Microsoft.ContainerRegistry

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Prepare Terraform variables
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Save Terraform state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate.backup
          key: terraform-state-${{ inputs.environment }}-${{ github.run_id }}
