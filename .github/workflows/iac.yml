name: IaC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment to run.
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: Run a plan or apply.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      image_tag:
        description: Container image tag to deploy.
        required: true
        default: dev-latest

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      TF_VAR_image_tag: ${{ inputs.image_tag }}
    defaults:
      run:
        working-directory: deploy/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Terraform state
        uses: actions/cache/restore@v4
        with:
          path: |
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate.backup
          key: terraform-state-${{ inputs.environment }}-${{ github.run_id }}
          restore-keys: |
            terraform-state-${{ inputs.environment }}-

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure resource providers
        run: |
          az provider register --namespace Microsoft.App
          az provider register --namespace Microsoft.OperationalInsights
          az provider register --namespace Microsoft.ContainerRegistry
          az provider register --namespace Microsoft.Cache
          az provider register --namespace Microsoft.DBforPostgreSQL
          az provider register --namespace Microsoft.Storage

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Prepare Terraform variables
        run: |
          cp terraform.tfvars.example terraform.tfvars
          jq -n --arg image_tag "${{ inputs.image_tag }}" '{image_tag: $image_tag}' > zz-workflow.auto.tfvars.json

      - name: Prepare API runtime variables
        env:
          API_APP_ENV: ${{ vars.API_APP_ENV || 'development' }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || secrets.SECRET_KEY }}
          API_ALGORITHM: ${{ vars.API_ALGORITHM || 'HS256' }}
          API_DB_NAME: ${{ secrets.API_DB_NAME || secrets.DB_NAME }}
          API_DB_USER: ${{ secrets.API_DB_USER || secrets.DB_USER }}
          API_DB_PASSWORD: ${{ secrets.API_DB_PASSWORD || secrets.DB_PASSWORD }}
          API_DB_HOST: ${{ secrets.API_DB_HOST || secrets.DB_HOST }}
          API_DB_PORT: ${{ vars.API_DB_PORT || secrets.API_DB_PORT || secrets.DB_PORT || '5432' }}
          API_DB_SSLMODE: ${{ vars.API_DB_SSLMODE || secrets.API_DB_SSLMODE || secrets.DB_SSLMODE || 'require' }}
          API_REDIS_URL: ${{ secrets.API_REDIS_URL || secrets.REDIS_URL }}
          API_MLFLOW_TRACKING_URI: ${{ secrets.API_MLFLOW_TRACKING_URI || secrets.MLFLOW_TRACKING_URI }}
          API_MAIL_USERNAME: ${{ secrets.API_MAIL_USERNAME || secrets.MAIL_USERNAME }}
          API_MAIL_PASSWORD: ${{ secrets.API_MAIL_PASSWORD || secrets.MAIL_PASSWORD }}
          API_MAIL_FROM: ${{ secrets.API_MAIL_FROM || secrets.MAIL_FROM }}
          API_MAIL_PORT: ${{ vars.API_MAIL_PORT || secrets.API_MAIL_PORT || secrets.MAIL_PORT || '587' }}
          API_MAIL_SERVER: ${{ vars.API_MAIL_SERVER || secrets.API_MAIL_SERVER || secrets.MAIL_SERVER || 'smtp.gmail.com' }}
          API_MAIL_FROM_NAME: ${{ vars.API_MAIL_FROM_NAME || secrets.API_MAIL_FROM_NAME || secrets.MAIL_FROM_NAME || 'OpsSight.ai' }}
          API_GROQ_API_KEY: ${{ secrets.API_GROQ_API_KEY || secrets.GROQ_API_KEY }}
          API_GROQ_MODEL: ${{ vars.API_GROQ_MODEL || secrets.API_GROQ_MODEL || secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          API_EVIDENTLY_TOKEN: ${{ secrets.API_EVIDENTLY_TOKEN || secrets.EVIDENTLY_TOKEN }}
          API_EVIDENTLY_PROJECT_ID: ${{ secrets.API_EVIDENTLY_PROJECT_ID || secrets.EVIDENTLY_PROJECT_ID }}
          API_EVIDENTLY_PROJECT_NAME: ${{ vars.API_EVIDENTLY_PROJECT_NAME || secrets.API_EVIDENTLY_PROJECT_NAME || secrets.EVIDENTLY_PROJECT_NAME || 'pipeline-doctor' }}
          API_SLACK_CLIENT_ID: ${{ secrets.API_SLACK_CLIENT_ID || secrets.SLACK_CLIENT_ID || vars.SLACK_CLIENT_ID }}
          API_SLACK_CLIENT_SECRET: ${{ secrets.API_SLACK_CLIENT_SECRET || secrets.SLACK_CLIENT_SECRET || vars.SLACK_CLIENT_SECRET }}
          API_SLACK_REDIRECT_URI: ${{ vars.API_SLACK_REDIRECT_URI || vars.SLACK_REDIRECT_URI || secrets.API_SLACK_REDIRECT_URI || secrets.SLACK_REDIRECT_URI }}
          AIRFLOW_ENABLED: ${{ vars.AIRFLOW_ENABLED || 'false' }}
          AIRFLOW_ADMIN_USERNAME: ${{ vars.AIRFLOW_ADMIN_USERNAME || secrets.AIRFLOW_ADMIN_USERNAME || 'admin' }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL: ${{ vars.AIRFLOW_ADMIN_EMAIL || secrets.AIRFLOW_ADMIN_EMAIL || 'admin@example.com' }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_WEBSERVER_SECRET_KEY: ${{ secrets.AIRFLOW_WEBSERVER_SECRET_KEY }}
          AIRFLOW_POSTGRESQL_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_POSTGRESQL_ADMIN_PASSWORD }}
          AIRFLOW_CONN_OPSSIGHT_API: ${{ secrets.AIRFLOW_CONN_OPSSIGHT_API }}
          AIRFLOW_VAR_OPSSIGHT_API_URL: ${{ vars.AIRFLOW_VAR_OPSSIGHT_API_URL || secrets.AIRFLOW_VAR_OPSSIGHT_API_URL }}
          AIRFLOW_VAR_OPSSIGHT_MODEL_ID: ${{ vars.AIRFLOW_VAR_OPSSIGHT_MODEL_ID || secrets.AIRFLOW_VAR_OPSSIGHT_MODEL_ID }}
          AIRFLOW_VAR_OPSSIGHT_MODEL_NAME: ${{ vars.AIRFLOW_VAR_OPSSIGHT_MODEL_NAME || secrets.AIRFLOW_VAR_OPSSIGHT_MODEL_NAME }}
          MLFLOW_POSTGRESQL_ADMIN_PASSWORD: ${{ secrets.MLFLOW_POSTGRESQL_ADMIN_PASSWORD }}
          MLFLOW_BACKEND_STORE_URI: ${{ secrets.MLFLOW_BACKEND_STORE_URI }}
          MLFLOW_ARTIFACT_ROOT: ${{ vars.MLFLOW_ARTIFACT_ROOT || secrets.MLFLOW_ARTIFACT_ROOT }}
          ENABLE_MONITORING: ${{ vars.ENABLE_MONITORING || 'false' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          required_missing=0
          for name in API_SECRET_KEY API_DB_NAME API_DB_USER API_DB_PASSWORD API_DB_HOST; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Environment secret: ${name}"
              required_missing=1
            fi
          done
          if [ -z "${MLFLOW_BACKEND_STORE_URI}" ] && [ -z "${MLFLOW_POSTGRESQL_ADMIN_PASSWORD}" ]; then
            echo "Missing required GitHub Environment secret: MLFLOW_POSTGRESQL_ADMIN_PASSWORD (required when MLFLOW_BACKEND_STORE_URI is not set)"
            required_missing=1
          fi
          if [ "${AIRFLOW_ENABLED}" = "true" ]; then
            for name in AIRFLOW_ADMIN_PASSWORD AIRFLOW_FERNET_KEY AIRFLOW_WEBSERVER_SECRET_KEY AIRFLOW_POSTGRESQL_ADMIN_PASSWORD AIRFLOW_CONN_OPSSIGHT_API; do
              if [ -z "${!name}" ]; then
                echo "Missing required GitHub Environment secret because AIRFLOW_ENABLED=true: ${name}"
                required_missing=1
              fi
            done
          fi

          if [ "${required_missing}" -ne 0 ]; then
            exit 1
          fi

          jq -n \
            --arg app_env "${API_APP_ENV}" \
            --arg secret_key "${API_SECRET_KEY}" \
            --arg algorithm "${API_ALGORITHM}" \
            --arg db_name "${API_DB_NAME}" \
            --arg db_user "${API_DB_USER}" \
            --arg db_password "${API_DB_PASSWORD}" \
            --arg db_host "${API_DB_HOST}" \
            --arg db_port "${API_DB_PORT}" \
            --arg db_sslmode "${API_DB_SSLMODE}" \
            --arg redis_url "${API_REDIS_URL}" \
            --arg mlflow_tracking_uri "${API_MLFLOW_TRACKING_URI}" \
            --arg mail_username "${API_MAIL_USERNAME}" \
            --arg mail_password "${API_MAIL_PASSWORD}" \
            --arg mail_from "${API_MAIL_FROM}" \
            --arg mail_port "${API_MAIL_PORT}" \
            --arg mail_server "${API_MAIL_SERVER}" \
            --arg mail_from_name "${API_MAIL_FROM_NAME}" \
            --arg groq_api_key "${API_GROQ_API_KEY}" \
            --arg groq_model "${API_GROQ_MODEL}" \
            --arg evidently_token "${API_EVIDENTLY_TOKEN}" \
            --arg evidently_project_id "${API_EVIDENTLY_PROJECT_ID}" \
            --arg evidently_project_name "${API_EVIDENTLY_PROJECT_NAME}" \
            --arg slack_client_id "${API_SLACK_CLIENT_ID}" \
            --arg slack_client_secret "${API_SLACK_CLIENT_SECRET}" \
            --arg slack_redirect_uri "${API_SLACK_REDIRECT_URI}" \
            --arg airflow_enabled "${AIRFLOW_ENABLED}" \
            --arg airflow_admin_username "${AIRFLOW_ADMIN_USERNAME}" \
            --arg airflow_admin_password "${AIRFLOW_ADMIN_PASSWORD}" \
            --arg airflow_admin_email "${AIRFLOW_ADMIN_EMAIL}" \
            --arg airflow_fernet_key "${AIRFLOW_FERNET_KEY}" \
            --arg airflow_webserver_secret_key "${AIRFLOW_WEBSERVER_SECRET_KEY}" \
            --arg airflow_postgresql_admin_password "${AIRFLOW_POSTGRESQL_ADMIN_PASSWORD}" \
            --arg airflow_conn_opssight_api "${AIRFLOW_CONN_OPSSIGHT_API}" \
            --arg airflow_var_opssight_api_url "${AIRFLOW_VAR_OPSSIGHT_API_URL}" \
            --arg airflow_var_opssight_model_id "${AIRFLOW_VAR_OPSSIGHT_MODEL_ID}" \
            --arg airflow_var_opssight_model_name "${AIRFLOW_VAR_OPSSIGHT_MODEL_NAME}" \
            --arg mlflow_postgresql_admin_password "${MLFLOW_POSTGRESQL_ADMIN_PASSWORD}" \
            --arg mlflow_backend_store_uri "${MLFLOW_BACKEND_STORE_URI}" \
            --arg mlflow_artifact_root "${MLFLOW_ARTIFACT_ROOT}" \
            --arg enable_monitoring "${ENABLE_MONITORING}" \
            --arg grafana_admin_password "${GRAFANA_ADMIN_PASSWORD}" \
            '{
              api_environment_variables: {
                APP_ENV: $app_env,
                ALGORITHM: $algorithm,
                DB_PORT: $db_port,
                DB_SSLMODE: $db_sslmode,
                MAIL_PORT: $mail_port,
                MAIL_SERVER: $mail_server,
                MAIL_FROM_NAME: $mail_from_name,
                GROQ_MODEL: $groq_model,
                EVIDENTLY_PROJECT_NAME: $evidently_project_name
              },
              api_secret_environment_variables: {
                SECRET_KEY: $secret_key,
                DB_NAME: $db_name,
                DB_USER: $db_user,
                DB_PASSWORD: $db_password,
                DB_HOST: $db_host,
                REDIS_URL: $redis_url,
                MLFLOW_TRACKING_URI: $mlflow_tracking_uri,
                MAIL_USERNAME: $mail_username,
                MAIL_PASSWORD: $mail_password,
                MAIL_FROM: $mail_from,
                GROQ_API_KEY: $groq_api_key,
                EVIDENTLY_TOKEN: $evidently_token,
                EVIDENTLY_PROJECT_ID: $evidently_project_id,
                SLACK_CLIENT_ID: $slack_client_id,
                SLACK_CLIENT_SECRET: $slack_client_secret,
                SLACK_REDIRECT_URI: $slack_redirect_uri
              } | with_entries(select(.value != ""))
            }
            + {
              enable_airflow: ($airflow_enabled == "true"),
              airflow_environment_variables: {
                AIRFLOW_ADMIN_USERNAME: $airflow_admin_username,
                AIRFLOW_ADMIN_EMAIL: $airflow_admin_email
              } | with_entries(select(.value != "")),
              airflow_secret_environment_variables: {
                AIRFLOW_ADMIN_PASSWORD: $airflow_admin_password,
                AIRFLOW__CORE__FERNET_KEY: $airflow_fernet_key,
                AIRFLOW__WEBSERVER__SECRET_KEY: $airflow_webserver_secret_key,
                AIRFLOW_CONN_OPSSIGHT_API: $airflow_conn_opssight_api,
                AIRFLOW_VAR_OPSSIGHT_API_URL: $airflow_var_opssight_api_url,
                AIRFLOW_VAR_OPSSIGHT_MODEL_ID: $airflow_var_opssight_model_id,
                AIRFLOW_VAR_OPSSIGHT_MODEL_NAME: $airflow_var_opssight_model_name
              } | with_entries(select(.value != ""))
            }
            + (if $mlflow_postgresql_admin_password != "" then {mlflow_postgresql_admin_password: $mlflow_postgresql_admin_password} else {} end)
            + (if $airflow_postgresql_admin_password != "" then {airflow_postgresql_admin_password: $airflow_postgresql_admin_password} else {} end)
            + (if $mlflow_backend_store_uri != "" then {mlflow_backend_store_uri: $mlflow_backend_store_uri} else {} end)
            + (if $mlflow_artifact_root != "" then {mlflow_artifact_root: $mlflow_artifact_root} else {} end)
            + {enable_monitoring: ($enable_monitoring == "true")}
            + (if $grafana_admin_password != "" then {grafana_admin_password: $grafana_admin_password} else {} end)' > runtime.auto.tfvars.json

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Save Terraform state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate
            deploy/terraform/environments/${{ inputs.environment }}/terraform.tfstate.backup
          key: terraform-state-${{ inputs.environment }}-${{ github.run_id }}
