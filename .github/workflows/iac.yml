name: IaC

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment to run.
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: Run a plan or apply.
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: deploy/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Azure resource providers
        run: |
          az provider register --namespace Microsoft.App
          az provider register --namespace Microsoft.OperationalInsights
          az provider register --namespace Microsoft.ContainerRegistry

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Prepare Terraform variables
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Import existing Azure resources
        run: |
          set -euo pipefail

          tf_value() {
            terraform console -var-file=terraform.tfvars <<< "var.$1" | tr -d '"'
          }

          import_if_exists() {
            local address="$1"
            local resource_id="$2"

            if [ -z "$resource_id" ]; then
              return
            fi

            if terraform state show "$address" > /dev/null 2>&1; then
              return
            fi

            terraform import -input=false "$address" "$resource_id"
          }

          resource_group_name="$(tf_value resource_group_name)"
          container_registry_name="$(tf_value container_registry_name)"
          container_apps_environment_name="$(tf_value container_apps_environment_name)"
          log_analytics_workspace_name="$(tf_value log_analytics_workspace_name)"

          resource_group_id="$(az group show --name "$resource_group_name" --query id -o tsv 2> /dev/null || true)"
          log_analytics_workspace_id="$(az monitor log-analytics workspace show --resource-group "$resource_group_name" --workspace-name "$log_analytics_workspace_name" --query id -o tsv 2> /dev/null || true)"
          container_registry_id="$(az acr show --resource-group "$resource_group_name" --name "$container_registry_name" --query id -o tsv 2> /dev/null || true)"
          container_apps_environment_id="$(az resource show --resource-group "$resource_group_name" --resource-type Microsoft.App/managedEnvironments --name "$container_apps_environment_name" --query id -o tsv 2> /dev/null || true)"

          import_if_exists module.platform.azurerm_resource_group.this "$resource_group_id"
          import_if_exists module.platform.azurerm_log_analytics_workspace.this "$log_analytics_workspace_id"
          import_if_exists module.platform.azurerm_container_registry.this "$container_registry_id"
          import_if_exists module.platform.azurerm_container_app_environment.this "$container_apps_environment_id"

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan
